# Hugo configuration file
title: iwamot's blog
defaultContentLanguage: ja
# Keep tag/list titles as written instead of auto-capitalizing (hugo, not Hugo)
capitalizeListTitles: false

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search
    - name: GitHub
      weight: 2
      url: "https://github.com/iwamot"
      params:
        icon: github
    - name: X
      weight: 3
      url: "https://x.com/iwamot"
      params:
        icon: x-twitter

params:
  # YYYY-MM-DD for all rendered dates
  dateFormat: "2006-01-02"

  toc:
    # Show the article's tags in the right-hand TOC sidebar
    displayTags: true

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: false

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc

  editURL:
    enable: false
